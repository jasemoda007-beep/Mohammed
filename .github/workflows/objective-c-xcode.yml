name: Build Dolphins ImGui Tweak

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout Project Code
      uses: actions/checkout@v4

    - name: Setup Theos
      uses: actions/checkout@v4
      with:
        repository: theos/theos
        path: theos
        submodules: true

    - name: Set THEOS Environment Variable
      run: echo "THEOS=$GITHUB_WORKSPACE/theos" >> $GITHUB_ENV

    - name: Setup iOS SDKs
      uses: actions/checkout@v4
      with:
        repository: theos/sdks
        path: theos/sdks

    - name: Install ldid
      run: brew install ldid

    - name: Unzip SDK
      run: |
        unzip -o SDK/sdk.zip -d SDK/
        mv SDK/SDK/* SDK/ 2>/dev/null || true

    - name: Build Tweak (Make Package)
      run: |
        make package FINALPACKAGE=1

    - name: Upload Compiled Tweak
      uses: actions/upload-artifact@v4
      with:
        name: LancerPlays-Tweak
        path: packages/*.deb
        
